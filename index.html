<!DOCTYPE html>

<head>

        :root {

        .card {

        .hidden { display: none !important; }

        @keyframes bounceGavel {

        .stationery {

            border-radius: 0.5rem;

        .case-id { font-family: monospace; font-size: 11px; color: var(--text-dark); margin-top: 0.25rem; }
        .verdict-text { color: #e7e5e4; font-size: 1rem; line-height: 1.7; }

        .stationery-footer { border-top: 1px solid #292524; padding-top: 1rem; margin-top: 1.5rem; text-align: center; }
        .footer-title { font-size: 11px; color: var(--accent-hover); letter-spacing: 0.05em; }
        .footer-line { width: 6rem; height: 1px; background-color: #444; margin: 0.5rem auto; }
        .footer-stamp { font-family: monospace; font-size: 10px; color: var(--text-dark); letter-spacing: 0.1em; text-transform: uppercase; }
        .flex-row { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
        @media (min-width: 640px) { .flex-row { flex-direction: row; } }
        .btn-secondary { flex: 1; background-color: var(--bg-main); border: 1px solid #444; color: #e7e5e4; padding: 0.85rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
        .error-msg { color: #ef4444; text-align: center; margin-top: 1rem; font-size: 0.875rem; }
    </style>
</head>

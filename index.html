<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Is Wrong | The Supreme Court of Petty Disputes</title>
  <style>
    :root { --bg-main: #1c1917; --bg-card: #0c0a09; --text-main: #f5f5f4; --text-muted: #a8a29e; --text-dark: #78716c; --accent: #d97706; --accent-hover: #f59e0b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
    .font-serif-court { font-family: 'Cinzel', 'Georgia', serif; }
    .sponsor-slot { width: 100%; background-color: var(--bg-card); padding: 12px; text-align: center; font-size: 12px; color: var(--text-dark); letter-spacing: 0.15em; border-bottom: 1px solid #292524; }
    .sponsor-slot.bottom { border-bottom: none; border-top: 1px solid #292524; padding: 16px; }
    main { max-width: 48rem; width: 100%; margin: 0 auto; padding: 3rem 1rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
    header { text-align: center; margin-bottom: 2.5rem; }
    .gavel-icon-box { display: inline-flex; align-items: center; justify-content: center; width: 5rem; height: 5rem; border-radius: 9999px; background-color: rgba(217, 119, 6, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); margin-bottom: 1rem; overflow: hidden; }
    .header-gavel-photo { width: 4.4rem; height: 4.4rem; object-fit: contain; transform: rotate(-18deg); filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.45)); }
    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: 0.05em; color: var(--accent-hover); text-transform: uppercase; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); font-size: 1rem; font-style: italic; }
    .card { background-color: var(--bg-card); border: 1px solid #292524; border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .split-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (min-width: 768px) { .split-grid { grid-template-columns: 1fr 1fr; } }
    .party-square { background-color: rgba(255, 255, 255, 0.02); border: 1px solid #292524; border-radius: 0.5rem; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 11px; font-weight: 600; color: var(--accent-hover); text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea { width: 100%; background-color: var(--bg-main); border: 1px solid #292524; border-radius: 0.375rem; padding: 0.75rem 1rem; color: var(--text-main); font-size: 0.875rem; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent-hover); }
    textarea { resize: none; }
    .btn-primary { width: 100%; background-color: var(--accent); color: #0c0a09; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 1rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.95rem; margin-top: 1rem; }
    .btn-primary:hover { background-color: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .hidden { display: none !important; }
    .loading-view { padding: 2rem 0 3rem; text-align: center; }
    .gavel-scene { position: relative; width: 250px; height: 180px; margin: 0 auto 1.5rem; }
    .gavel-photo { position: absolute; width: 180px; left: 28px; top: 2px; object-fit: contain; transform-origin: 92% 58%; transform: rotate(16deg); filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.5)); z-index: 2; }
    .sound-block { position: absolute; width: 118px; height: 34px; left: 22px; bottom: 22px; border-radius: 50%; background: linear-gradient(180deg, #b7662b 0%, #7a3516 58%, #3a1608 100%); box-shadow: 0 10px 0 #1f0c05; z-index: 1; }
    .sound-block::before { content: ""; position: absolute; left: 13px; right: 13px; top: 5px; height: 9px; border-radius: 999px; background: rgba(255, 182, 96, 0.28); }
    .impact-lines { position: absolute; left: 34px; bottom: 86px; opacity: 0; transform: scaleX(-1); }
    .impact-lines span { display: block; width: 32px; height: 4px; margin: 8px 0; background: #f5f5f4; border-radius: 999px; }
    .impact-lines span:nth-child(1) { transform: rotate(-36deg); }
    .impact-lines span:nth-child(2) { transform: rotate(0deg); }
    .impact-lines span:nth-child(3) { transform: rotate(36deg); }
    .gavel-scene.slam-active .gavel-photo { animation: gavelSlam var(--slam-cycle, 1.35s) ease-in-out 0s 3 both; }
    .gavel-scene.slam-active .impact-lines { animation: impactFlash var(--slam-cycle, 1.35s) ease-in-out 0s 3 both; }
    @keyframes gavelSlam { 0%, 100% { transform: rotate(16deg); } 48% { transform: rotate(-18deg); } 60% { transform: rotate(-12deg); } }
    @keyframes impactFlash { 0%, 44%, 100% { opacity: 0; } 48%, 62% { opacity: 1; } }
    .stationery { background-color: var(--bg-main); border: 2px solid rgba(217, 119, 6, 0.3); border-radius: 0.5rem; padding: 2rem; }
    .stationery-header { border-bottom: 1px solid #292524; padding-bottom: 1rem; text-align: center; margin-bottom: 1.5rem; }
    .stationery-header h2 { font-size: 1.5rem; color: var(--accent-hover); text-transform: uppercase; letter-spacing: 0.1em; }
    .case-id { font-family: monospace; font-size: 11px; color: var(--text-dark); margin-top: 0.25rem; }
    .verdict-text { color: #e7e5e4; font-size: 1rem; line-height: 1.7; }
    .verdict-text .mb-4 { margin-bottom: 1.5rem; }
    .verdict-text h3 { color: var(--accent-hover); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .verdict-text p { font-size: 0.925rem; margin-bottom: 0.75rem; }
    .verdict-text .p-3 { background-color: rgba(217, 119, 6, 0.03); border: 1px solid rgba(217, 119, 6, 0.15); padding: 1rem; border-radius: 0.375rem; }
    .stationery-footer { border-top: 1px solid #292524; padding-top: 1rem; margin-top: 1.5rem; text-align: center; }
    .btn-secondary { width: 100%; background-color: var(--bg-main); border: 1px solid #444; color: #e7e5e4; padding: 0.85rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    .error-msg { color: #ef4444; text-align: center; margin-top: 1rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="sponsor-slot">SPONSOR SPACE</div>
  <main>
    <header>
      <div class="gavel-icon-box"><img id="header-gavel" alt="" class="header-gavel-photo"></div>
      <h1 class="font-serif-court">Who Is Wrong</h1>
      <p class="subtitle">Settle your petty, stupid arguments with absolute, unyielding judicial authority.</p>
    </header>
    <div class="card">
      <div id="form-view">
        <div class="split-grid">
          <div class="party-square">
            <div class="input-group"><label for="nameA">Party A (You / Accuser)</label><input type="text" id="nameA" placeholder="Your name..."></div>
            <div class="input-group"><label for="argA">Your Argument / Bill of Complaints</label><textarea id="argA" rows="4" placeholder="State your side of the dispute..."></textarea></div>
          </div>
          <div class="party-square">
            <div class="input-group"><label for="nameB">Party B (The Accused / Defense)</label><input type="text" id="nameB" placeholder="Their name..."></div>
            <div class="input-group"><label for="argB">Their Argument / Counter-Claim</label><textarea id="argB" rows="4" placeholder="State their side or what they claim..."></textarea></div>
          </div>
        </div>
        <button id="submit-btn" class="btn-primary" onclick="slamGavelButton()">Slam the Gavel</button>
        <div id="validation-error" class="error-msg hidden">Please enter both names and arguments before slamming the gavel!</div>
      </div>
      <div id="loading-view" class="loading-view hidden">
        <div id="gavel-scene" class="gavel-scene" aria-hidden="true">
          <img id="loading-gavel" alt="" class="gavel-photo">
          <div class="sound-block"></div>
          <div class="impact-lines"><span></span><span></span><span></span></div>
        </div>
        <p class="subtitle">Reviewing petty transcripts... Consulting ancient scrolls...</p>
      </div>
      <div id="verdict-view" class="stationery hidden">
        <div class="stationery-header"><h2>Official Decree</h2><div class="case-id" id="display-case-id">CASE NO. #00000</div></div>
        <div class="verdict-text"></div>
        <div class="stationery-footer"><button class="btn-secondary" onclick="resetForm()">Hear Another Case</button></div>
      </div>
    </div>
  </main>
  <div class="sponsor-slot bottom">SPONSOR SPACE</div>
  <audio id="gavel-sound" src="gavel-hit.mp3?v=1" preload="auto"></audio>
  <script>
    const gavelImage = 'gavel-web.svg?v=2';
    document.getElementById('header-gavel').src = gavelImage;
    document.getElementById('loading-gavel').src = gavelImage;
    const gavelScene = document.getElementById('gavel-scene');
    const gavelSound = document.getElementById('gavel-sound');

    function syncSlamTimingToSound() {
      if (Number.isFinite(gavelSound.duration) && gavelSound.duration > 0) {
        const cycleSeconds = Math.max(0.65, Math.min(2.5, gavelSound.duration / 3));
        gavelScene.style.setProperty('--slam-cycle', `${cycleSeconds}s`);
      }
    }

    function startGavelSequence() {
      syncSlamTimingToSound();
      gavelScene.classList.remove('slam-active');
      void gavelScene.offsetWidth;
      gavelScene.classList.add('slam-active');

      gavelSound.pause();
      gavelSound.currentTime = 0;
      const playAttempt = gavelSound.play();
      if (playAttempt) playAttempt.catch(() => {});
    }

    gavelSound.addEventListener('loadedmetadata', syncSlamTimingToSound);

    async function slamGavelButton() {
      const nameA = document.getElementById('nameA').value.trim();
      const argA = document.getElementById('argA').value.trim();
      const nameB = document.getElementById('nameB').value.trim();
      const argB = document.getElementById('argB').value.trim();
      const errorBox = document.getElementById('validation-error');
      const formView = document.getElementById('form-view');
      const loadingView = document.getElementById('loading-view');
      const verdictView = document.getElementById('verdict-view');
      const caseIdBox = document.getElementById('display-case-id');
      const verdictText = document.querySelector('.verdict-text');
      const submitBtn = document.getElementById('submit-btn');
      if (!nameA || !argA || !nameB || !argB) {
        errorBox.textContent = 'Please enter both names and arguments before slamming the gavel!';
        errorBox.classList.remove('hidden');
        return;
      }
      errorBox.classList.add('hidden');
      formView.classList.add('hidden');
      verdictView.classList.add('hidden');
      loadingView.classList.remove('hidden');
      submitBtn.disabled = true;
      startGavelSequence();
      try {
        const response = await fetch('/api/settle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nameA, argA, nameB, argB })
        });
        const data = await response.json();
        if (!response.ok || !data.success) throw new Error(data.error || 'The court failed to reach a verdict.');
        caseIdBox.textContent = `CASE NO. #${data.caseId}`;
        verdictText.innerHTML = data.htmlContent;
        loadingView.classList.add('hidden');
        verdictView.classList.remove('hidden');
      } catch (error) {
        loadingView.classList.add('hidden');
        formView.classList.remove('hidden');
        errorBox.textContent = error.message;
        errorBox.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
      }
    }
    function resetForm() {
      document.getElementById('nameA').value = '';
      document.getElementById('argA').value = '';
      document.getElementById('nameB').value = '';
      document.getElementById('argB').value = '';
      document.getElementById('validation-error').classList.add('hidden');
      document.getElementById('form-view').classList.remove('hidden');
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('verdict-view').classList.add('hidden');
      gavelScene.classList.remove('slam-active');
      gavelSound.pause();
      gavelSound.currentTime = 0;
    }
    window.slamGavelButton = slamGavelButton;
    window.resetForm = resetForm;
  </script>
</body>
</html>

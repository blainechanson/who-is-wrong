    <script>
        const formView = document.getElementById('form-view');
        const loadingView = document.getElementById('loading-view');
        const verdictView = document.getElementById('verdict-view');
        const submitBtn = document.getElementById('submit-btn');
        const newCaseBtn = document.getElementById('new-case-btn');
        const errorBox = document.getElementById('error-box');
        
        const nameAInput = document.getElementById('nameA');
        const argAInput = document.getElementById('argA');
        const nameBInput = document.getElementById('nameB');
        const argBInput = document.getElementById('argB');
        const verdictContent = document.getElementById('verdict-content');
        const caseIdEl = document.getElementById('case-id');

        // Check if the button is even being registered by the browser
        if (!submitBtn) {
            alert("CRITICAL BUG: The browser cannot find the button element with id='submit-btn'!");
        } else {
            console.log("Gavel button found in DOM and event listener attached successfully.");
        }

        submitBtn.addEventListener('click', async () => {
            // Test 1: Did the click actually register?
            alert("Gavel clicked! Starting validation checks...");

            const nameA = nameAInput ? nameAInput.value.trim() : '';
            const argA = argAInput ? argAInput.value.trim() : '';
            const nameB = nameBInput ? nameBInput.value.trim() : '';
            const argB = argBInput ? argBInput.value.trim() : '';

            // Test 2: Show what inputs the code read
            alert(`Inputs read:\nParty A: [${nameA}]\nArg A: [${argA}]\nParty B: [${nameB}]\nArg B: [${argB}]`);

            if (!nameA || !argA || !nameB || !argB) {
                alert("Validation failed: One or more fields are empty!");
                errorBox.textContent = "Both parties must fill out their Name and Argument squares to stand trial.";
                errorBox.classList.remove('hidden');
                return;
            }

            alert("Validation passed! Switching to loading screen and launching fetch request...");

            errorBox.classList.add('hidden');
            formView.classList.add('hidden');
            loadingView.classList.remove('hidden');

            try {
                const response = await fetch('/api/settle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nameA, argA, nameB, argB })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Server returned code ${response.status}`);
                }
                
                caseIdEl.textContent = `CASE NO. #${Math.floor(100000 + Math.random() * 900000)}`;
                verdictContent.innerHTML = data.htmlContent || 'No verdict issued.';
                
                loadingView.classList.add('hidden');
                verdictView.classList.remove('hidden');
            } catch (err) {
                loadingView.classList.add('hidden');
                formView.classList.remove('hidden');
                errorBox.textContent = `Trial Interrupted: ${err.message}`;
                errorBox.classList.remove('hidden');
                alert(`Fetch error encountered: ${err.message}`);
            }
        });

        newCaseBtn.addEventListener('click', () => {
            nameAInput.value = '';
            argAInput.value = '';
            nameBInput.value = '';
            argBInput.value = '';
            verdictView.classList.add('hidden');
            formView.classList.remove('hidden');
        });
    </script>

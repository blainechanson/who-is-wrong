<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Is Wrong | The Supreme Court of Petty Disputes</title>
  <style>
    :root {
      --bg-main: #1c1917;
      --bg-card: #0c0a09;
      --text-main: #f5f5f4;
      --text-muted: #a8a29e;
      --text-dark: #78716c;
      --accent: #d97706;
      --accent-hover: #f59e0b;
      --border-color: #2e2a24;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .font-serif-court {
      font-family: 'Cinzel', 'Georgia', serif;
    }

    .sponsor-slot {
      width: 100%;
      background-color: var(--bg-card);
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dark);
      letter-spacing: 0.15em;
      border-bottom: 1px solid #292524;
    }

    .sponsor-slot.bottom {
      border-bottom: none;
      border-top: 1px solid #292524;
      padding: 16px;
    }

    main {
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .gavel-icon-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 9999px;
      background-color: rgba(217, 119, 6, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: var(--accent-hover);
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .gavel-svg {
      width: 1.4em;
      height: 1.4em;
      vertical-align: -0.25em;
      flex-shrink: 0;
    }

    .gavel-large {
      width: 3rem;
      height: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--accent-hover);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      font-style: italic;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid #292524;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .split-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
      .split-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .party-square {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid #292524;
      border-radius: 0.5rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-hover);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input,
    textarea {
      width: 100%;
      background-color: var(--bg-main);
      border: 1px solid #292524;
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      color: var(--text-main);
      font-size: 0.875rem;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent-hover);
    }

    textarea {
      resize: none;
    }

    .btn-primary {
      width: 100%;
      background-color: var(--accent);
      color: #0c0a09;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .loading-view {
      padding: 3rem 0;
      text-align: center;
    }

    .bounce-gavel {
      color: var(--accent-hover);
      animation: bounceGavel 1s infinite alternate;
      margin-bottom: 1.5rem;
      display: inline-flex;
      justify-content: center;
    }

    @keyframes bounceGavel {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      100% {
        transform: translateY(-20px) rotate(-20deg);
      }
    }

    .stationery {
      background-color: var(--bg-main);
      border: 2px solid rgba(217, 119, 6, 0.3);
      border-radius: 0.5rem;
      padding: 2rem;
    }

    .stationery-header {
      border-bottom: 1px solid #292524;
      padding-bottom: 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .stationery-header h2 {
      font-size: 1.5rem;
      color: var(--accent-hover);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .case-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-dark);
      margin-top: 0.25rem;
    }

    .verdict-text {
      color: #e7e5e4;
      font-size: 1rem;
      line-height: 1.7;
    }

    .verdict-text .mb-4 {
      margin-bottom: 1.5rem;
    }

    .verdict-text h3 {
      color: var(--accent-hover);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .verdict-text p {
      font-size: 0.925rem;
      margin-bottom: 0.75rem;
    }

    .verdict-text .p-3 {
      background-color: rgba(217, 119, 6, 0.03);
      border: 1px solid rgba(217, 119, 6, 0.15);
      padding: 1rem;
      border-radius: 0.375rem;
    }

    .stationery-footer {
      border-top: 1px solid #292524;
      padding-top: 1rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    .btn-secondary {
      width: 100%;
      background-color: var(--bg-main);
      border: 1px solid #444;
      color: #e7e5e4;
      padding: 0.85rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
    }

    .error-msg {
      color: #ef4444;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="sponsor-slot">SPONSOR SPACE</div>

  <main>
    <header>
      <div class="gavel-icon-box">
        <svg class="gavel-svg gavel-large" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="20" y="9" width="27" height="12" rx="3" fill="#8b4513" transform="rotate(38 33.5 15)" />
          <rect x="15" y="18" width="35" height="10" rx="3" fill="#c47a2c" transform="rotate(38 32.5 23)" />
          <rect x="31" y="27" width="9" height="31" rx="3" fill="#7a3f16" transform="rotate(-42 35.5 42.5)" />
          <rect x="14" y="49" width="34" height="7" rx="3" fill="#5f3414" />
        </svg>
      </div>

      <h1 class="font-serif-court">Who Is Wrong</h1>
      <p class="subtitle">Settle your petty, stupid arguments with absolute, unyielding judicial authority.</p>
    </header>

    <div class="card">
      <div id="form-view">
        <div class="split-grid">
          <div class="party-square">
            <div class="input-group">
              <label for="nameA">Party A (You / Accuser)</label>
              <input type="text" id="nameA" placeholder="Your name...">
            </div>

            <div class="input-group">
              <label for="argA">Your Argument / Bill of Complaints</label>
              <textarea id="argA" rows="4" placeholder="State your side of the dispute..."></textarea>
            </div>
          </div>

          <div class="party-square">
            <div class="input-group">
              <label for="nameB">Party B (The Accused / Defense)</label>
              <input type="text" id="nameB" placeholder="Their name...">
            </div>

            <div class="input-group">
              <label for="argB">Their Argument / Counter-Claim</label>
              <textarea id="argB" rows="4" placeholder="State their side or what they claim..."></textarea>
            </div>
          </div>
        </div>

        <button id="submit-btn" class="btn-primary" onclick="slamGavelButton()">
          <svg class="gavel-svg" viewBox="0 0 64 64" aria-hidden="true">
            <rect x="20" y="9" width="27" height="12" rx="3" fill="#5f3414" transform="rotate(38 33.5 15)" />
            <rect x="15" y="18" width="35" height="10" rx="3" fill="#8b4513" transform="rotate(38 32.5 23)" />
            <rect x="31" y="27" width="9" height="31" rx="3" fill="#4a2810" transform="rotate(-42 35.5 42.5)" />
          </svg>
          Slam the Gavel
        </button>

        <div id="validation-error" class="error-msg hidden">Please enter both names and arguments before slamming the gavel!</div>
      </div>

      <div id="loading-view" class="loading-view hidden">
        <div class="bounce-gavel">
          <svg class="gavel-svg gavel-large" viewBox="0 0 64 64" aria-hidden="true">
            <rect x="20" y="9" width="27" height="12" rx="3" fill="#8b4513" transform="rotate(38 33.5 15)" />
            <rect x="15" y="18" width="35" height="10" rx="3" fill="#c47a2c" transform="rotate(38 32.5 23)" />
            <rect x="31" y="27" width="9" height="31" rx="3" fill="#7a3f16" transform="rotate(-42 35.5 42.5)" />
            <rect x="14" y="49" width="34" height="7" rx="3" fill="#5f3414" />
          </svg>
        </div>

        <p class="subtitle">Reviewing petty transcripts... Consulting ancient scrolls...</p>
      </div>

      <div id="verdict-view" class="stationery hidden">
        <div class="stationery-header">
          <h2>Official Decree</h2>
          <div class="case-id" id="display-case-id">CASE NO. #00000</div>
        </div>

        <div class="verdict-text"></div>

        <div class="stationery-footer">
          <button class="btn-secondary" onclick="resetForm()">Hear Another Case</button>
        </div>
      </div>
    </div>
  </main>

  <div class="sponsor-slot bottom">SPONSOR SPACE</div>

  <script>
    async function slamGavelButton() {
      const nameA = document.getElementById('nameA').value.trim();
      const argA = document.getElementById('argA').value.trim();
      const nameB = document.getElementById('nameB').value.trim();
      const argB = document.getElementById('argB').value.trim();

      const errorBox = document.getElementById('validation-error');
      const formView = document.getElementById('form-view');
      const loadingView = document.getElementById('loading-view');
      const verdictView = document.getElementById('verdict-view');
      const caseIdBox = document.getElementById('display-case-id');
      const verdictText = document.querySelector('.verdict-text');
      const submitBtn = document.getElementById('submit-btn');

      if (!nameA || !argA || !nameB || !argB) {
        errorBox.textContent = 'Please enter both names and arguments before slamming the gavel!';
        errorBox.classList.remove('hidden');
        return;
      }

      errorBox.classList.add('hidden');
      formView.classList.add('hidden');
      verdictView.classList.add('hidden');
      loadingView.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/settle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nameA, argA, nameB, argB })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || 'The court failed to reach a verdict.');
        }

        caseIdBox.textContent = `CASE NO. #${data.caseId}`;
        verdictText.innerHTML = data.htmlContent;

        loadingView.classList.add('hidden');
        verdictView.classList.remove('hidden');
      } catch (error) {
        loadingView.classList.add('hidden');
        formView.classList.remove('hidden');
        errorBox.textContent = error.message;
        errorBox.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
      }
    }

    function resetForm() {
      document.getElementById('nameA').value = '';
      document.getElementById('argA').value = '';
      document.getElementById('nameB').value = '';
      document.getElementById('argB').value = '';

      document.getElementById('validation-error').classList.add('hidden');
      document.getElementById('form-view').classList.remove('hidden');
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('verdict-view').classList.add('hidden');
    }

    window.slamGavelButton = slamGavelButton;
    window.resetForm = resetForm;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Is Wrong | The Supreme Court of Petty Disputes</title>
    <style>
        /* Base Variables & Reset */
        :root {
            --bg-main: #1c1917; /* stone-900 */
            --bg-card: #0c0a09; /* stone-950 */
            --text-main: #f5f5f4; /* stone-100 */
            --text-muted: #a8a29e; /* stone-400 */
            --text-dark: #78716c; /* stone-500 */
            --accent: #d97706; /* amber-600 */
            --accent-hover: #f59e0b; /* amber-500 */
            --border-color: #2e2a24;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        ::selection { background-color: var(--accent); color: #000; }

        /* Layout & Typography */
        .font-serif-court { font-family: 'Cinzel', 'Georgia', serif; }
        .ad-space {
            width: 100%;
            background-color: var(--bg-card);
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dark);
            letter-spacing: 0.15em;
            border-bottom: 1px solid #292524;
        }
        .ad-space.bottom { border-bottom: none; border-top: 1px solid #292524; padding: 16px; }
        
        main {
            max-width: 42rem;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        header { text-align: center; margin-bottom: 2.5rem; }
        .gavel-icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 4rem;
            height: 4rem;
            border-radius: 9999px;
            background-color: rgba(217, 119, 6, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--accent-hover);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: 0.05em; color: var(--accent-hover); text-transform: uppercase; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: 1rem; font-style: italic; }

        /* Card System Workspace */
        .card {
            background-color: var(--bg-card);
            border: 1px solid #292524;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 11px; font-weight: 600; color: var(--accent-hover); text-transform: uppercase; letter-spacing: 0.05em; }
        input, textarea {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid #292524;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 0.875rem;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-hover); }
        textarea { resize: none; }

        /* Interactive Buttons */
        .btn-primary {
            width: 100%;
            background-color: var(--accent);
            color: #0c0a09;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: var(--accent-hover); }
        
        .hidden { display: none !important; }
        
        /* Loading Screen View */
        .loading-view { padding: 3rem 0; text-align: center; }
        .bounce-gavel { font-size: 3rem; color: var(--accent-hover); animation: bounceGavel 0.6s infinite alternate; margin-bottom: 1.5rem; }
        @keyframes bounceGavel {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(-15deg); }
        }
        
        /* Court Stationery Output Canvas */
        .stationery {
            background-color: var(--bg-main);
            border: 2px solid rgba(217, 119, 6, 0.3);
            border-radius: 0.5rem;
            padding: 2rem;
            position: relative;
        }
        .stationery-header { border-bottom: 1px solid #292524; padding-bottom: 1rem; text-align: center; margin-bottom: 1.5rem; }
        .stationery-header h2 { font-size: 1.5rem; color: var(--accent-hover); text-transform: uppercase; letter-spacing: 0.1em; }
        .case-id { font-family: monospace; font-size: 11px; color: var(--text-dark); margin-top: 0.25rem; }
        
        /* Formatted Response Segments */
        .verdict-text { color: #e7e5e4; font-size: 1rem; line-height: 1.7; }
        .verdict-text .mb-4 { margin-bottom: 1.5rem; }
        .verdict-text h3 { color: var(--accent-hover); font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .verdict-text p { font-size: 0.925rem; margin-bottom: 0.75rem; }
        .verdict-text .p-3 { background-color: rgba(217, 119, 6, 0.03); border: 1px solid rgba(217, 119, 6, 0.15); padding: 1rem; border-radius: 0.375rem; }
        
        .stationery-footer { border-top: 1px solid #292524; padding-top: 1rem; margin-top: 1.5rem; text-align: center; }
        .footer-title { font-size: 11px; color: var(--accent-hover); letter-spacing: 0.05em; }
        .footer-line { width: 6rem; height: 1px; background-color: #444; margin: 0.5rem auto; }
        .footer-stamp { font-family: monospace; font-size: 10px; color: var(--text-dark); letter-spacing: 0.1em; text-transform: uppercase; }

        .flex-row { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
        @media (min-width: 640px) { .flex-row { flex-direction: row; } }
        .btn-secondary {
            flex: 1; background-color: var(--bg-main); border: 1px solid #444; color: #e7e5e4; padding: 0.85rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer;
        }
        .btn-reset { width: 33.333%; background-color: #292524; border: none; color: var(--text-muted); padding: 0.85rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
        .btn-reset:hover { color: #fff; background-color: #444; }
    </style>
</head>
<body>

    <div class="ad-space">ADVERTISEMENT SPACE</div>

    <main>
        <header>
            <div class="gavel-icon-box">⚖️</div>
            <h1 class="font-serif-court">Who Is Wrong</h1>
            <p class="subtitle">Settle your petty, stupid arguments with absolute, unyielding judicial authority.</p>
        </header>

        <div class="card">
            <!-- Dynamic Form Section -->
            <div id="form-view" class="space-y-6">
                <div class="grid">
                    <div class="input-group">
                        <label>Party A (You)</label>
                        <input type="text" id="party-a-name" placeholder="Your Name">
                        <textarea id="party-a-argument" rows="3" placeholder="Your side of the argument... (e.g., You peel a banana top down.)"></textarea>
                    </div>
                    <div class="input-group">
                        <label>Party B (The Opponent)</label>
                        <input type="text" id="party-b-name" placeholder="Their Name">
                        <textarea id="party-b-argument" rows="3" placeholder="Their wrong opinion... (e.g., You peel a banana bottom up.)"></textarea>
                    </div>
                </div>
                <button id="submit-btn" class="btn-primary">Bang the Gavel (Settle It)</button>
            </div>

            <!-- Loading View -->
            <div id="loading-view" class="hidden loading-view">
                <div class="bounce-gavel">🔨</div>
                <p id="loading-text" class="subtitle font-serif-court">Reviewing the petty evidence...</p>
            </div>

            <!-- Verdict / Output View -->
            <div id="verdict-view" class="hidden space-y-6">
                <div class="stationery">
                    <div class="stationery-header">
                        <h2 class="font-serif-court">Official Judicial Decree</h2>
                        <div id="display-case-id" class="case-id">CASE ID: #000000</div>
                    </div>
                    <!-- FIXED: Fully closed structural block prevents view transition freezes -->
                    <div id="verdict-content" class="verdict-text"></div>
                    <div class="stationery-footer">
                        <div class="footer-title font-serif-court">CHIEF JUSTICE OF THE PETTY COURT</div>
                        <div class="footer-line"></div>
                        <div class="footer-stamp">Verdict Final & Absolute</div>
                    </div>
                </div>
                <div class="flex-row">
                    <button id="copy-link-btn" class="btn-secondary">🔗 Copy Shareable Link</button>
                    <button id="reset-btn" class="btn-reset">New Dispute</button>
                </div>
            </div>
        </div>
    </main>
